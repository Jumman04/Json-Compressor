<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JSON Compressor</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    h1 {
      margin: 0;
      padding: 12px;
      text-align: center;
      background: #f0f0f0;
      font-size: 20px;
    }

    form {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    textarea {
      flex: 1;
      border: none;
      resize: none;
      outline: none;
      padding: 12px;
      font-size: 15px;
      font-family: monospace;
    }

    button {
      height: 50px;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }

    #copiedMessage {
      position: fixed;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: #4CAF50;
      color: white;
      padding: 8px 16px;
      border-radius: 8px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    #copiedMessage.show {
      opacity: 1;
    }
  </style>
</head>

<body>

  <h1>JSON Compressor</h1>

  <form onsubmit="compressJson(event)">
    <textarea
      id="inputText"
      placeholder="Paste JSON here..."
    ></textarea>

    <button type="submit">
      Compress
    </button>
  </form>

  <div id="copiedMessage">
    ✅ Copied!
  </div>

  <script>

    function compressJson(event) {

      event.preventDefault();

      const textarea =
        document.getElementById("inputText");

      try {

        // Parse JSON
        const parsed =
          JSON.parse(textarea.value);

        // Minify JSON
        let compressed =
          JSON.stringify(parsed);

        // PHP-style unicode escaping
        compressed = compressed.replace(
          /[\u007F-\uFFFF]/g,
          char =>
            '\\u' +
            ('0000' + char.charCodeAt(0).toString(16))
            .slice(-4)
        );

        // Remove escaped slashes
        compressed =
          compressed.replaceAll("\\/", "/");

        // Update textarea
        textarea.value = compressed;

        // Copy
        navigator.clipboard.writeText(compressed);

        // Show message
        showCopiedMessage();

      } catch (e) {

        alert("Invalid JSON");

      }
    }

    function showCopiedMessage() {

      const msg =
        document.getElementById("copiedMessage");

      msg.classList.add("show");

      setTimeout(() => {
        msg.classList.remove("show");
      }, 1500);
    }

  </script>

</body>
</html>
